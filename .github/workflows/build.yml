name: Build PI WEB Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build PI WEB (if not already built)
        run: |
          if (-not (Test-Path "../pi-web-New-UI-/dist")) {
            npm run build --prefix ../pi-web-New-UI-
          }

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PI-WEB-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload to release (on release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
